name: Provenance Metrics Scraper

on:
  schedule:
    - cron: '55 4 * * *'   # 11:55 PM EST (UTC-5). Change to '55 3 * * *' in EDT summer.
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Pull latest data
        run: git pull origin main

      - name: Run scraper
        run: python provenance_scraper.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json provenance_metrics.xlsx
          git diff --staged --quiet || git commit -m "Auto: Provenance metrics $(date +'%Y-%m-%d')"
          git push origin main
