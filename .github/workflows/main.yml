name: Provenance Metrics Scraper

on:
  schedule:
    - cron: '10 4 * * *'   # 11:10 PM ET (EDT / UTC-4). Change to '10 4 * * *' when DST ends (EST).
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright openpyxl pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Pull latest data
        run: git pull origin main

      - name: Run scraper
        run: python provenance_scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json provenance_metrics.xlsx
          git diff --staged --quiet || git commit -m "Auto: Provenance metrics $(date +'%Y-%m-%d')"
          git push origin main
