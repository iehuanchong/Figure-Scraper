name: Provenance Metrics Scraper

on:
  schedule:
    # 11:55 PM ET = 04:55 UTC (EST) or 03:55 UTC (EDT)
    # Use 04:55 UTC (covers EST/winter). Adjust to 03:55 in summer if needed.
    - cron: '55 4 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Download existing Excel file (if any)
        continue-on-error: true
        run: |
          # Pull the latest Excel file from the repo if it exists
          git pull origin main

      - name: Run scraper
        run: python provenance_scraper.py

      - name: Commit and push updated Excel file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add provenance_metrics.xlsx
          git diff --staged --quiet || git commit -m "Auto: Provenance metrics $(date +'%Y-%m-%d')"
          git push origin main
