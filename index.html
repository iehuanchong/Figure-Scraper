<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provenance Blockchain — Loan Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1419;
    --surface2: #141c24;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --accent3: #00ff9d;
    --text: #e8f4f8;
    --muted: #4a6278;
    --muted2: #2a3d4f;
    --danger: #ff4d6d;
    --warn: #ffb347;
    --pink: #ff9ef5;
    --gold: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; align-items: center; gap: 16px; }

  .logo-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%,100% { opacity:1; box-shadow: 0 0 20px var(--accent); }
    50%      { opacity:.4; box-shadow: 0 0 8px var(--accent); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .last-updated { font-size: 11px; color: var(--muted); text-align: right; }
  .last-updated strong { color: var(--accent3); }

  /* ── Period Tabs ── */
  .period-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .period-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .period-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .period-tab {
    padding: 8px 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .period-tab:hover { color: var(--text); background: var(--surface2); }

  .period-tab.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .period-tab[data-period="1w"].active  { background: var(--accent2); }
  .period-tab[data-period="1m"].active  { background: var(--accent3); color: #080c10; }
  .period-tab[data-period="3m"].active  { background: var(--gold);    color: #080c10; }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .kpi-card.c1::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .kpi-card.c2::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .kpi-card.c3::before { background: linear-gradient(90deg, var(--accent3), transparent); }
  .kpi-card.c4::before { background: linear-gradient(90deg, var(--warn), transparent); }
  .kpi-card.c5::before { background: linear-gradient(90deg, var(--danger), transparent); }

  .kpi-card:hover { border-color: var(--muted2); transform: translateY(-2px); }

  .kpi-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  .kpi-value.na { color: var(--muted2); font-size: 18px; }

  .kpi-sub { font-size: 10px; color: var(--muted); }

  /* ── Chart Section ── */
  .chart-section { margin-bottom: 48px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  canvas { display: block; }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    margin-bottom: 60px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }

  thead { background: var(--surface2); border-bottom: 1px solid var(--border); }

  th {
    padding: 14px 16px;
    text-align: right;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  th:first-child { text-align: left; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td { padding: 12px 16px; text-align: right; white-space: nowrap; }
  td:first-child { text-align: left; color: var(--muted); font-size: 11px; }

  .val-money  { color: var(--accent); }
  .val-count  { color: var(--accent3); }
  .val-na     { color: var(--muted2); }

  /* ── States ── */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 16px;
    color: var(--muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--danger); font-size: 13px; text-align: center; }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @media (max-width: 700px) {
    .container { padding: 0 16px; }
    h1 { font-size: 20px; }
    .kpi-value { font-size: 20px; }
    .header-inner { flex-direction: column; align-items: flex-start; }
    .last-updated { text-align: left; }
    .period-tab { padding: 8px 16px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-inner">
      <div class="logo-area">
        <div class="logo-dot"></div>
        <div>
          <h1>Provenance <span>Loan Metrics</span></h1>
          <div class="subtitle">Blockchain Activity Dashboard</div>
        </div>
      </div>
      <div class="last-updated" id="lastUpdated">Loading...</div>
    </div>
  </header>

  <!-- Period Selector -->
  <div class="period-bar">
    <span class="period-label">View as reported by</span>
    <div class="period-tabs">
      <button class="period-tab active" data-period="24h">1D</button>
      <button class="period-tab"        data-period="1w">1W</button>
      <button class="period-tab"        data-period="1m">1M</button>
      <button class="period-tab"        data-period="3m">3M</button>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="state-msg"><div class="spinner"></div></div>
  </div>

  <!-- Chart: Loan Amount Funded -->
  <div class="chart-section">
    <div class="section-header">
      <div class="section-title">Loan Amount Funded</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chartFunded" height="90"></canvas>
    </div>
  </div>

  <!-- Chart: Loan Amount Paid -->
  <div class="chart-section">
    <div class="section-header">
      <div class="section-title">Loan Amount Paid</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chartPaid" height="90"></canvas>
    </div>
  </div>

  <!-- Chart: Loan Counts -->
  <div class="chart-section">
    <div class="section-header">
      <div class="section-title">Loans Funded &amp; Paid (Count)</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chartCounts" height="90"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="section-header">
    <div class="section-title">Raw Data</div>
  </div>
  <div class="table-wrap">
    <div id="tableContainer"><div class="state-msg"><div class="spinner"></div></div></div>
  </div>

</div>

<footer>
  Data scraped from provenance.io/pulse · Updated daily at 11:55 PM ET · Auto-deployed via GitHub Actions
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const DATA_URL = './data.json';

let allData    = [];
let currentPeriod = '24h';
let charts     = {};

// ── Helpers ──────────────────────────────────────────────────────────────────

function parseVal(v) {
  if (!v || v === 'N/A') return null;
  const s = String(v).replace(/[$,\s]/g, '');
  if (s.endsWith('B')) return parseFloat(s) * 1e9;
  if (s.endsWith('M')) return parseFloat(s) * 1e6;
  if (s.endsWith('K')) return parseFloat(s) * 1e3;
  return parseFloat(s) || null;
}

function fmtMoney(n) {
  if (n === null || isNaN(n)) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function fmtCount(n) {
  if (n === null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString();
}

function parseDate(s) {
  return new Date(s.split(' ').slice(0,2).join('T'));
}

function shortDate(s) {
  // "2026-03-01 11:55 PM ET" → "03-01"
  return s.slice(5, 10);
}

function getSuffix(period) {
  return `_${period}`;
}

// ── Latest row for KPIs ───────────────────────────────────────────────────────

function getLatest() {
  if (!allData.length) return null;
  return [...allData].sort((a,b) => parseDate(b.date) - parseDate(a.date))[0];
}

// ── KPI Cards ─────────────────────────────────────────────────────────────────

function renderKPIs() {
  const grid   = document.getElementById('kpiGrid');
  const latest = getLatest();

  if (!latest) {
    grid.innerHTML = '<div class="state-msg"><span>No data available</span></div>';
    return;
  }

  const p = currentPeriod;
  const periodNames = { '24h': '24-Hour', '1w': '1-Week', '1m': '1-Month', '3m': '3-Month' };

  const raw = (key) => latest[key] || 'N/A';
  const num = (key) => parseVal(latest[key]);

  const cards = [
    { label: 'Loan Amt Funded',   key: `loan_amount_funded_${p}`, fmt: fmtMoney, cls: 'c1' },
    { label: 'Loans Funded',      key: `loans_funded_${p}`,       fmt: fmtCount, cls: 'c2' },
    { label: 'Loan Amt Paid',     key: `loan_amount_paid_${p}`,   fmt: fmtMoney, cls: 'c3' },
    { label: 'Loans Paid',        key: `loans_paid_${p}`,         fmt: fmtCount, cls: 'c4' },
    { label: 'Total Participants',key: 'total_participants',       fmt: fmtCount, cls: 'c5' },
  ];

  grid.innerHTML = cards.map(c => {
    const n   = num(c.key);
    const val = n !== null ? c.fmt(n) : raw(c.key);
    const isNA = val === 'N/A';
    return `
      <div class="kpi-card ${c.cls}">
        <div class="kpi-label">${c.label}</div>
        <div class="kpi-value${isNA ? ' na' : ''}">${isNA ? '—' : val}</div>
        <div class="kpi-sub">Latest · ${periodNames[p]} view</div>
      </div>`;
  }).join('');
}

// ── Charts ────────────────────────────────────────────────────────────────────

const CHART_DEFAULTS = {
  borderWidth: 2,
  pointRadius: 3,
  pointHoverRadius: 6,
  tension: 0.35,
  fill: true,
};

function makeGradient(ctx, color) {
  const g = ctx.createLinearGradient(0, 0, 0, 280);
  g.addColorStop(0, color + '40');
  g.addColorStop(1, color + '00');
  return g;
}

const AXIS_OPTS = (isMoney) => ({
  ticks: {
    color: '#4a6278',
    font: { family: 'DM Mono', size: 10 },
    callback: isMoney
      ? v => v >= 1e9 ? '$'+(v/1e9).toFixed(1)+'B'
             : v >= 1e6 ? '$'+(v/1e6).toFixed(1)+'M'
             : v >= 1e3 ? '$'+(v/1e3).toFixed(0)+'K'
             : '$'+v
      : v => v >= 1e6 ? (v/1e6).toFixed(1)+'M'
             : v >= 1e3 ? (v/1e3).toFixed(0)+'K'
             : v
  },
  grid: { color: '#1e2d3d' }
});

function buildChart(id, labels, datasets, isMoney = true) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#4a6278', font: { family: 'DM Mono', size: 11 }, boxWidth: 12 }
        },
        tooltip: {
          backgroundColor: '#0e1419',
          borderColor: '#1e2d3d',
          borderWidth: 1,
          titleColor: '#e8f4f8',
          bodyColor: '#4a6278',
          titleFont: { family: 'Syne', size: 12 },
          bodyFont: { family: 'DM Mono', size: 11 },
        }
      },
      scales: {
        x: {
          ticks: { color: '#4a6278', font: { family: 'DM Mono', size: 10 }, maxRotation: 45 },
          grid: { color: '#1e2d3d' }
        },
        y: AXIS_OPTS(isMoney)
      }
    }
  });
}

function renderCharts() {
  const sorted = [...allData].sort((a,b) => parseDate(a.date) - parseDate(b.date));
  const labels = sorted.map(r => shortDate(r.date));
  const p      = currentPeriod;

  // Chart 1: Loan Amount Funded
  const ctx1 = document.getElementById('chartFunded').getContext('2d');
  buildChart('chartFunded', labels, [{
    label: `Loan Amount Funded (${p.toUpperCase()})`,
    data: sorted.map(r => parseVal(r[`loan_amount_funded_${p}`])),
    borderColor: '#00d4ff',
    backgroundColor: makeGradient(ctx1, '#00d4ff'),
    ...CHART_DEFAULTS
  }], true);

  // Chart 2: Loan Amount Paid
  const ctx2 = document.getElementById('chartPaid').getContext('2d');
  buildChart('chartPaid', labels, [{
    label: `Loan Amount Paid (${p.toUpperCase()})`,
    data: sorted.map(r => parseVal(r[`loan_amount_paid_${p}`])),
    borderColor: '#ff9ef5',
    backgroundColor: makeGradient(ctx2, '#ff9ef5'),
    ...CHART_DEFAULTS
  }], true);

  // Chart 3: Counts (funded + paid)
  const ctx3 = document.getElementById('chartCounts').getContext('2d');
  buildChart('chartCounts', labels, [
    {
      label: `Loans Funded (${p.toUpperCase()})`,
      data: sorted.map(r => parseVal(r[`loans_funded_${p}`])),
      borderColor: '#7b61ff',
      backgroundColor: makeGradient(ctx3, '#7b61ff'),
      ...CHART_DEFAULTS
    },
    {
      label: `Loans Paid (${p.toUpperCase()})`,
      data: sorted.map(r => parseVal(r[`loans_paid_${p}`])),
      borderColor: '#00ff9d',
      backgroundColor: makeGradient(ctx3, '#00ff9d'),
      ...CHART_DEFAULTS
    }
  ], false);
}

// ── Table ─────────────────────────────────────────────────────────────────────

function renderTable() {
  const container = document.getElementById('tableContainer');
  if (!allData.length) {
    container.innerHTML = '<div class="state-msg"><span>No data</span></div>';
    return;
  }

  const sorted = [...allData].sort((a,b) => parseDate(b.date) - parseDate(a.date));
  const p = currentPeriod;

  const money = (v) => {
    const n = parseVal(v);
    return n !== null
      ? `<span class="val-money">${fmtMoney(n)}</span>`
      : `<span class="val-na">—</span>`;
  };
  const count = (v) => {
    const n = parseVal(v);
    return n !== null
      ? `<span class="val-count">${fmtCount(n)}</span>`
      : `<span class="val-na">—</span>`;
  };

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Loan Amt Funded</th>
          <th>Loans Funded</th>
          <th>Loan Amt Paid</th>
          <th>Loans Paid</th>
          <th>Total Participants</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(r => `
          <tr>
            <td>${r.date.slice(0,10)}</td>
            <td>${money(r[`loan_amount_funded_${p}`])}</td>
            <td>${count(r[`loans_funded_${p}`])}</td>
            <td>${money(r[`loan_amount_paid_${p}`])}</td>
            <td>${count(r[`loans_paid_${p}`])}</td>
            <td>${count(r.total_participants)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Render all ────────────────────────────────────────────────────────────────

function render() {
  renderKPIs();
  renderCharts();
  renderTable();
}

// ── Event listeners ───────────────────────────────────────────────────────────

document.querySelectorAll('.period-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    render();
  });
});

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();

    if (allData.length) {
      const latest = getLatest();
      document.getElementById('lastUpdated').innerHTML =
        `Last updated<br><strong>${latest.date.slice(0,10)}</strong>`;
    }

    render();
  } catch(e) {
    document.getElementById('kpiGrid').innerHTML =
      `<div class="state-msg"><span class="error-msg">Failed to load data.json<br>${e.message}</span></div>`;
    document.getElementById('tableContainer').innerHTML =
      `<div class="state-msg"><span class="error-msg">No data available</span></div>`;
  }
}

loadData();
</script>
</body>
</html>
